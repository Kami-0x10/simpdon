<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新しい投稿 - Simpdon クライアント</title>
    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/json2.js"></script>
    <link rel="icon" href="./ico/simpdon.ico">
</head>

<body>
    <div class="container">
        <h1>新しい投稿</h1>
        <div class="form">
            <textarea id="content" placeholder="投稿内容を入力してください"></textarea>
            <input type="file" id="image" accept="image/*">
            <a href="javascript:void(0);" id="post-btn" class="button">投稿</a>
            <a href="timeline.html" class="button">タイムラインに戻る</a>
        </div>
    </div>

    <script>
        // Cookieから情報を取得
        function getCookie(name) {
            var nameEq = name + "=";
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i].replace(/^\s+/, '');
                if (c.indexOf(nameEq) === 0) return c.substring(nameEq.length, c.length);
            }
            return "";
        }

        // 画像をBase64に変換
        function convertToBase64(file, callback) {
            var reader = new FileReader();
            reader.onloadend = function () {
                callback(reader.result.split(',')[1]);  // Base64文字列（`data:image/*;base64,`部分を除去）
            };
            reader.readAsDataURL(file);
        }

        // CORSプロキシを使用して画像アップロード
        function uploadImage(imageFile, callback) {
            var instanceUrl = getCookie('instanceUrl');
            var accessToken = getCookie('accessToken');

            var corsProxyUrl = 'https://cors-0x10.online:4443/';  // CORSプロキシ
            var apiUrl = instanceUrl + '/api/v1/media';  // 画像アップロード用API URL

            var formData = new FormData();
            formData.append('file', imageFile);

            var xhr = new XMLHttpRequest();
            xhr.open('POST', corsProxyUrl + apiUrl, true);  // CORSプロキシを経由
            xhr.setRequestHeader('Authorization', 'Bearer ' + accessToken);

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var response = JSON.parse(xhr.responseText);
                        if (response.id) {
                            callback(response.id);  // 画像IDをコールバックで返す
                        } else {
                            alert('画像のアップロードに失敗しました');
                        }
                    } else {
                        alert('画像のアップロードに失敗しました。エラーコード: ' + xhr.status);
                    }
                }
            };

            xhr.send(formData);  // 画像を送信
        }

        // 投稿ボタンがクリックされたとき
        document.getElementById('post-btn').onclick = function () {
            var content = document.getElementById('content').value.trim();
            var imageFile = document.getElementById('image').files[0];  // 画像ファイルを取得

            if (!content && !imageFile) {
                alert('投稿内容または画像を入力してください');
                return;
            }

            var instanceUrl = getCookie('instanceUrl');
            var accessToken = getCookie('accessToken');

            if (!instanceUrl || !accessToken) {
                alert('ログイン情報が見つかりません');
                window.location.href = 'login.html';
                return;
            }

            // 投稿データ
            var data = { status: content };

            if (imageFile) {
                // 画像がある場合、先にアップロードしてそのIDを取得
                uploadImage(imageFile, function (mediaId) {
                    data.media_ids = [mediaId];  // 画像IDを投稿に追加

                    // 投稿データを送信
                    sendPostRequestViaCorsProxy(data);
                });
            } else {
                // 画像がない場合、そのまま投稿
                sendPostRequestViaCorsProxy(data);
            }
        };

        // CORSプロキシを通して投稿データを送信する関数
        function sendPostRequestViaCorsProxy(data) {
            var instanceUrl = getCookie('instanceUrl');
            var accessToken = getCookie('accessToken');
            var corsProxyUrl = 'https://cors-0x10.online:4443/';  // CORSプロキシのURL
            var apiUrl = instanceUrl + '/api/v1/statuses';  // 投稿APIのURL

            var xhr = new XMLHttpRequest();
            xhr.open('POST', corsProxyUrl + apiUrl, true);  // CORSプロキシを経由
            xhr.setRequestHeader('Authorization', 'Bearer ' + accessToken);

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var response = JSON.parse(xhr.responseText);
                        if (response.id) {
                            alert('投稿が成功しました');
                            window.location.href = 'timeline.html';  // タイムラインにリダイレクト
                        } else {
                            alert('投稿に失敗しました');
                        }
                    } else {
                        alert('投稿に失敗しました。エラーコード: ' + xhr.status);
                    }
                }
            };

            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify(data));  // 投稿データをJSONとして送信
        }
    </script>
</body>

</html>
