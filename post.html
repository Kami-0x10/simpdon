<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="./ico/simpdon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="./ico/simpdon.ico">
    <meta name="msapplication-TileImage" content="./ico/simpdon.ico">
    <meta name="msapplication-TileColor" content="#ffffff">
    <link rel="icon" href="./ico/simpdon.ico">
    <script src="./js/json2.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新しい投稿 - Simpdon クライアント</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <div class="container">
        <h1>新しい投稿</h1>
        <div class="form">
            <textarea id="content" placeholder="投稿内容を入力してください"></textarea>
            <input type="file" id="image" accept="image/*">
            <a href="javascript:void(0);" id="post-btn" class="button">投稿</a>
            <!-- 追加: timeline.htmlに戻るボタン -->
            <a href="timeline.html" class="button">タイムラインに戻る</a>
        </div>
    </div>

    <!-- iframeを追加 -->
    <iframe id="hidden-frame" name="hidden-frame" style="display:none;"></iframe>

    <script>
        function getCookie(name) {
            var nameEq = name + "=";
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i].replace(/^\s+/, ''); // 前後の空白を削除
                if (c.indexOf(nameEq) === 0) return c.substring(nameEq.length, c.length);
            }
            return "";
        }

        // 画像をBase64形式に変換する関数
        function convertToBase64(file, callback) {
            var reader = new FileReader();
            reader.onloadend = function() {
                callback(reader.result.split(',')[1]);  // Base64文字列（`data:image/*;base64,`部分を除去）
            };
            reader.readAsDataURL(file);
        }

        // 画像をアップロードして、そのメディアIDを取得する関数
        function uploadImage(imageFile, callback) {
            var instanceUrl = getCookie('instanceUrl');
            var accessToken = getCookie('accessToken');

            var formData = new FormData();
            formData.append('file', imageFile);

            var apiUrl = instanceUrl + '/api/v1/media';  // 画像アップロード用のAPI URL
            var xhr = new XMLHttpRequest();
            xhr.open("POST", apiUrl, true);
            xhr.setRequestHeader("Authorization", "Bearer " + accessToken);

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var response = JSON.parse(xhr.responseText);
                        if (response.id) {
                            callback(response.id);  // 成功した場合、画像IDをコールバックで返す
                        } else {
                            alert('画像のアップロードに失敗しました');
                        }
                    } else {
                        alert('画像のアップロードに失敗しました。エラーコード: ' + xhr.status);
                    }
                }
            };

            xhr.send(formData);  // 画像データを送信
        }

        // 投稿ボタンがクリックされたとき
        document.getElementById('post-btn').onclick = function () {
            var content = document.getElementById('content').value.replace(/^\s+|\s+$/g, '');
            var imageFile = document.getElementById('image').files[0];  // 画像ファイルを取得

            if (!content && !imageFile) {
                alert('投稿内容または画像を入力してください');
                return;
            }

            var instanceUrl = getCookie('instanceUrl');
            var accessToken = getCookie('accessToken');

            if (!instanceUrl || !accessToken) {
                alert('ログイン情報が見つかりません');
                window.location.href = 'login.html';
                return;
            }

            // 投稿データ
            var data = { status: content };

            if (imageFile) {
                // 画像がある場合、先にアップロードしてそのIDを取得
                uploadImage(imageFile, function(mediaId) {
                    data.media_ids = [mediaId];  // 画像IDを投稿に追加

                    // iframeを使って投稿送信
                    sendPostRequestViaIframe(data);
                });
            } else {
                // 画像がない場合、そのまま投稿
                sendPostRequestViaIframe(data);
            }
        };

        // iframeを使って投稿を送信する関数
        function sendPostRequestViaIframe(data) {
            var instanceUrl = getCookie('instanceUrl');
            var accessToken = getCookie('accessToken');
            var apiUrl = instanceUrl + '/api/v1/statuses';  // 投稿用APIのURL

            // iframeを設定
            var iframe = document.getElementById('hidden-frame');
            var form = document.createElement('form');
            form.setAttribute('method', 'POST');
            form.setAttribute('action', 'https://cors-0x10.online:4443/' + apiUrl);  // CORSプロキシを経由
            form.setAttribute('target', 'hidden-frame');
            
            // 投稿データをhiddenフィールドに追加
            var inputContent = document.createElement('input');
            inputContent.setAttribute('type', 'hidden');
            inputContent.setAttribute('name', 'status');
            inputContent.setAttribute('value', data.status);
            form.appendChild(inputContent);

            // 画像IDをhiddenフィールドに追加
            if (data.media_ids) {
                var inputMedia = document.createElement('input');
                inputMedia.setAttribute('type', 'hidden');
                inputMedia.setAttribute('name', 'media_ids[]');
                inputMedia.setAttribute('value', data.media_ids[0]);
                form.appendChild(inputMedia);
            }

            // Authorizationを追加
            var inputAuth = document.createElement('input');
            inputAuth.setAttribute('type', 'hidden');
            inputAuth.setAttribute('name', 'Authorization');
            inputAuth.setAttribute('value', 'Bearer ' + accessToken);
            form.appendChild(inputAuth);

            // iframeにフォームを追加して送信
            iframe.contentWindow.document.body.appendChild(form);
            form.submit();  // フォーム送信
        }
    </script>
</body>

</html>
