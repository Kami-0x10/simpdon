<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="./ico/simpdon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="./ico/simpdon.ico">
    <meta name="msapplication-TileImage" content="./ico/simpdon.ico">
    <meta name="msapplication-TileColor" content="#ffffff">
    <link rel="icon" href="./ico/simpdon.ico">
    <script src="./js/json2.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新しい投稿 - Simpdon クライアント</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <div class="container">
        <h1>新しい投稿</h1>
        <div class="form">
            <textarea id="content" placeholder="投稿内容を入力してください"></textarea>
            <input type="file" id="image" accept="image/*">
            <a href="javascript:void(0);" id="post-btn" class="button">投稿</a>
            <!-- 追加: timeline.htmlに戻るボタン -->
            <a href="timeline.html" class="button">タイムラインに戻る</a>
        </div>
    </div>

    <iframe id="hidden-frame" name="hidden-frame" style="display:none;"></iframe>

    <script>
        function getCookie(name) {
            var nameEq = name + "=";
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i].replace(/^\s+/, ''); // 前後の空白を削除
                if (c.indexOf(nameEq) === 0) return c.substring(nameEq.length, c.length);
            }
            return "";
        }

        // 画像アップロードをフォームで行う方法
        function uploadImageWithForm(imageFile, callback) {
            var instanceUrl = getCookie('instanceUrl');
            var accessToken = getCookie('accessToken');
            
            // アップロード用フォームを作成
            var form = document.createElement('form');
            form.action = instanceUrl + '/api/v1/media';  // Mastodonのメディアアップロードエンドポイント
            form.method = 'POST';
            form.target = 'hidden-frame';  // iframeに結果を表示させる

            // フォームに画像を追加
            var inputFile = document.createElement('input');
            inputFile.type = 'file';
            inputFile.name = 'file';
            inputFile.files = [imageFile];  // 画像ファイルを設定
            form.appendChild(inputFile);

            // アクセストークンを追加（Authorizationヘッダーが使えないのでクエリパラメータで）
            var tokenInput = document.createElement('input');
            tokenInput.type = 'hidden';
            tokenInput.name = 'access_token';
            tokenInput.value = accessToken;
            form.appendChild(tokenInput);

            // フォームをDOMに追加して送信
            document.body.appendChild(form);
            form.submit();
        }

        // 投稿ボタンがクリックされたとき
        document.getElementById('post-btn').onclick = function () {
            var content = document.getElementById('content').value.replace(/^\s+|\s+$/g, '');
            var imageFile = document.getElementById('image').files[0];  // 画像ファイルを取得

            if (!content && !imageFile) {
                alert('投稿内容または画像を入力してください');
                return;
            }

            var instanceUrl = getCookie('instanceUrl');
            var accessToken = getCookie('accessToken');

            if (!instanceUrl || !accessToken) {
                alert('ログイン情報が見つかりません');
                window.location.href = 'login.html';
                return;
            }

            // 投稿データ
            var data = { status: content };

            if (imageFile) {
                // 画像がある場合、フォームでアップロード
                uploadImageWithForm(imageFile, function(mediaId) {
                    data.media_ids = [mediaId];  // 画像IDを投稿に追加

                    // 投稿を送信
                    sendPostRequest(data);
                });
            } else {
                // 画像がない場合、そのまま投稿
                sendPostRequest(data);
            }
        };

        // 投稿を送信する関数
        function sendPostRequest(data) {
            var instanceUrl = getCookie('instanceUrl');
            var accessToken = getCookie('accessToken');
            var apiUrl = instanceUrl + '/api/v1/statuses';  // 投稿用APIのURL

            var xhr = new XMLHttpRequest();
            xhr.open("POST", apiUrl, true);
            xhr.setRequestHeader("Authorization", "Bearer " + accessToken);
            xhr.setRequestHeader("Content-Type", "application/json");

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var response = JSON.parse(xhr.responseText);
                        if (response.id) {
                            alert('投稿が送信されました');
                        } else {
                            alert('投稿の送信に失敗しました');
                        }
                    } else {
                        alert('投稿の送信に失敗しました。エラーコード: ' + xhr.status);
                    }
                }
            };

            // リクエストボディのデータをJSON形式で送信
            xhr.send(JSON.stringify(data));
        }
    </script>
</body>

</html>
