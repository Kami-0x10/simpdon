<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="./ico/simpdon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="./ico/simpdon.ico">
    <meta name="msapplication-TileImage" content="./ico/simpdon.ico">
    <meta name="msapplication-TileColor" content="#ffffff">
    <link rel="icon" href="./ico/simpdon.ico">
    <script src="./js/json2.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新しい投稿 - Simpdon クライアント</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <div class="container">
        <h1>新しい投稿</h1>
        <div class="form">
            <textarea id="content" placeholder="投稿内容を入力してください"></textarea>
            <input type="file" id="image" accept="image/*">
            <a href="javascript:void(0);" id="post-btn" class="button">投稿</a>
            <!-- 追加: timeline.htmlに戻るボタン -->
            <a href="timeline.html" class="button">タイムラインに戻る</a>
        </div>
    </div>

    <script>
        function getCookie(name) {
            var nameEq = name + "=";
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i].replace(/^\s+/, ''); // 前後の空白を削除
                if (c.indexOf(nameEq) === 0) return c.substring(nameEq.length, c.length);
            }
            return "";
        }

        // 画像をBase64エンコードしてアップロードする
        function encodeImageToBase64(file, callback) {
            var reader = new FileReader();
            reader.onloadend = function () {
                callback(reader.result.split(',')[1]);  // Base64エンコードされた画像のデータ部分を返す
            };
            reader.readAsDataURL(file);  // ファイルを読み込んでBase64エンコード
        }

        // 投稿ボタンがクリックされたとき
        document.getElementById('post-btn').onclick = function () {
            var content = document.getElementById('content').value.replace(/^\s+|\s+$/g, '');
            var imageFile = document.getElementById('image').files[0];  // 画像ファイルを取得

            if (!content && !imageFile) {
                alert('投稿内容または画像を入力してください');
                return;
            }

            var instanceUrl = getCookie('instanceUrl');
            var accessToken = getCookie('accessToken');

            if (!instanceUrl || !accessToken) {
                alert('ログイン情報が見つかりません');
                window.location.href = 'login.html';
                return;
            }

            var proxyUrl = "https://cors-0x10.online:4443/";  // CORSプロキシ

            // FormDataオブジェクトを作成
            var formData = new FormData();
            formData.append('status', content);  // 投稿内容を追加

            if (imageFile) {
                // 画像がある場合、Base64エンコードして投稿データに追加
                encodeImageToBase64(imageFile, function(base64Image) {
                    formData.append('file', base64Image);  // Base64エンコードされた画像データを追加

                    // 投稿を送信
                    sendPostRequest(formData);
                });
            } else {
                // 画像がない場合、そのまま投稿
                sendPostRequest(formData);
            }
        };

        // 投稿を送信する関数
        function sendPostRequest(formData) {
            var instanceUrl = getCookie('instanceUrl');
            var accessToken = getCookie('accessToken');
            var apiUrl = instanceUrl + '/api/v1/statuses';  // 投稿用APIのURL

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "https://cors-0x10.online:4443/" + apiUrl, true);  // CORSプロキシ経由でリクエスト
            xhr.setRequestHeader("Authorization", "Bearer " + accessToken);

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var response = JSON.parse(xhr.responseText);
                        if (response.id) {
                            alert('投稿が送信されました');
                        } else {
                            alert('投稿の送信に失敗しました');
                        }
                    } else {
                        alert('投稿の送信に失敗しました。エラーコード: ' + xhr.status);
                    }
                }
            };

            // FormDataオブジェクトを送信
            xhr.send(formData);
        }
    </script>
</body>

</html>
