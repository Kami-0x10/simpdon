<script>
    // CookieからインスタンスURLとアクセストークンを取得する関数
    function getCookie(name) {
        var nameEq = name + "=";
        var ca = document.cookie.split(';');
        for (var i = 0; i < ca.length; i++) {
            var c = ca[i].trim();
            if (c.indexOf(nameEq) === 0) return c.substring(nameEq.length, c.length);
        }
        return "";
    }

    // ログイン状態を確認
    var instanceUrl = getCookie('instanceUrl');
    var accessToken = getCookie('accessToken');

    if (!instanceUrl || !accessToken) {
        window.location.href = 'login.html'; // ログインしていなければログインページに遷移
    }

    // 投稿を取得する関数 (XMLHttpRequestを使用)
    function fetchPosts() {
        var apiUrl = "/api/v1/timelines/public"; // Public TLのみ取得

        // プロキシサーバーのURLを使用してリクエスト
        var proxyUrl = "https://cors-0x10.online:4443/";
        var fullUrl = proxyUrl + instanceUrl + apiUrl; // プロキシを通してAPIのURLにアクセス

        var xhr = new XMLHttpRequest();
        xhr.open("GET", fullUrl, true);
        xhr.setRequestHeader('Authorization', 'Bearer ' + accessToken);
        xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');

        // タイムアウト設定 (iOS6でリクエストがタイムアウトすることがある)
        xhr.timeout = 5000; // 5秒

        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        displayPosts(data);
                    } catch (e) {
                        console.error("エラー:", e);
                        document.getElementById('posts').innerHTML = '<p>投稿の読み込みに失敗しました。</p>';
                    }
                } else {
                    console.error('ネットワークエラー:', xhr.status, xhr.statusText);
                    document.getElementById('posts').innerHTML = '<p>投稿の読み込みに失敗しました。</p>';
                }
            }
        };

        xhr.onerror = function() {
            console.error('リクエストエラーが発生しました');
            document.getElementById('posts').innerHTML = '<p>投稿の読み込みに失敗しました。</p>';
        };

        xhr.ontimeout = function() {
            console.error('リクエストがタイムアウトしました');
            document.getElementById('posts').innerHTML = '<p>タイムアウトしました。再試行してください。</p>';
        };

        xhr.send();
    }

    // 画像をBase64でPNGに変換して表示する関数
    function convertWebPToPNG(webpUrl, callback) {
        var img = new Image();
        img.src = webpUrl;
        img.onload = function() {
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            var pngDataUrl = canvas.toDataURL('image/png');
            callback(pngDataUrl);
        };
        img.onerror = function() {
            callback(webpUrl); // WebP画像の変換に失敗した場合、元のURLをそのまま返す
        };
    }

    // 投稿を表示する関数
    function displayPosts(posts) {
        var postsContainer = document.getElementById('posts');
        postsContainer.innerHTML = ''; // 既存の投稿をクリア

        posts.forEach(function (post) {
            var postElement = document.createElement('div');
            postElement.classList.add('post');

            var username = post.account.acct;
            var content = post.content;

            // ユーザーのアイコンを取得
            var avatarUrl = post.account.avatar;
            var avatarImg = avatarUrl ? `<img src="${avatarUrl}" alt="@${username}のアイコン" class="user-avatar" />` : '';

            // 画像がある場合、その画像を表示
            var images = '';
            if (post.media_attachments && post.media_attachments.length > 0) {
                images = post.media_attachments.map(function (attachment) {
                    if (attachment.url.endsWith('.webp')) {
                        // WebP画像ならPNGに変換
                        convertWebPToPNG(attachment.url, function(pngDataUrl) {
                            var imgElement = `<img src="${pngDataUrl}" alt="画像" class="post-image" />`;
                            postsContainer.innerHTML += imgElement;
                        });
                    } else {
                        // WebP以外の画像はそのまま表示
                        return `<img src="${attachment.url}" alt="画像" class="post-image" />`;
                    }
                }).join('');
            }

            var emojiContent = content.replace(/:([a-zA-Z0-9_+]+):/g, function (match, emoji) {
                return '<span class="emoji">' + emoji + '</span>';
            });

            postElement.innerHTML = `
                <div class="post-header">
                    ${avatarImg}
                    <h2>@${username}</h2>
                </div>
                <p>${emojiContent}</p>
                ${images}
            `;
            postsContainer.appendChild(postElement);
        });
    }

    // 初期表示はPublic TLを表示
    window.onload = function() {
        fetchPosts();
    };
</script>
