<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投稿一覧 - Simpdon クライアント</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="container">
        <h1>投稿一覧</h1>
        <div class="menu">
            <a href="javascript:void(0);" onclick="setTimeline('home')">Home TL</a> |
            <a href="javascript:void(0);" onclick="setTimeline('public')">Public TL</a>
        </div>
        <div id="posts" class="posts"></div>
        <div class="actions">
            <a href="post.html" class="button">新しい投稿</a>
            <a href="login.html" class="logout-link">ログアウト</a>
        </div>
    </div>

    <script>
        // Cookieから値を取得
        function getCookie(name) {
            var nameEq = name + "=";
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i].trim();
                if (c.indexOf(nameEq) === 0) return c.substring(nameEq.length, c.length);
            }
            return "";
        }

        // 初期設定
        var instanceUrl = getCookie('instanceUrl');
        var accessToken = getCookie('accessToken');
        if (!instanceUrl || !accessToken) {
            window.location.href = 'login.html';
        }

        // 投稿を取得
        function fetchPosts(timelineType) {
            var apiUrl = timelineType === 'home' ? "/api/v1/timelines/home" : "/api/v1/timelines/public";
            var proxyUrl = "https://cors-0x10.online:4443/"; // iOS 6対応のCORSプロキシ

            var xhr = new XMLHttpRequest();
            xhr.open("GET", proxyUrl + instanceUrl + apiUrl, true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + accessToken);
            xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');

            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            displayPosts(data);
                        } catch (e) {
                            document.getElementById('posts').innerHTML = '<p>投稿の読み込みに失敗しました。</p>';
                        }
                    } else {
                        document.getElementById('posts').innerHTML = '<p>投稿の読み込みに失敗しました。</p>';
                    }
                }
            };

            xhr.onerror = function () {
                document.getElementById('posts').innerHTML = '<p>投稿の読み込みに失敗しました。</p>';
            };

            xhr.send();
        }

        // 投稿を表示
        function displayPosts(posts) {
            var postsContainer = document.getElementById('posts');
            postsContainer.innerHTML = '';

            for (var i = 0; i < posts.length; i++) {
                var post = posts[i];
                var postElement = document.createElement('div');
                postElement.className = 'post';

                var username = post.account ? post.account.acct : '不明';
                var content = post.content || '';

                // 投稿内容を追加
                postElement.innerHTML = '<h2>@' + username + '</h2><p>' + content + '</p>';
                
                // 画像を追加
                if (post.media_attachments && post.media_attachments.length > 0) {
                    for (var j = 0; j < post.media_attachments.length; j++) {
                        var attachment = post.media_attachments[j];
                        var imgElement = document.createElement('img');
                        imgElement.src = attachment.url || '';
                        imgElement.alt = "画像";
                        imgElement.className = 'post-image';
                        postElement.appendChild(imgElement);
                    }
                }

                postsContainer.appendChild(postElement);
            }
        }

        // 初期タイムライン設定
        function setTimeline(timelineType) {
            fetchPosts(timelineType);
        }

        // 初期表示
        window.onload = function () {
            setTimeline('home');
        };
    </script>
</body>
</html>
